    <div id="opencollection-container"></div>
    <script>
        const collectionData = "opencollection: 1.0.0\ninfo:\n  name: Talo API\nconfig:\n  proxy:\n    inherit: true\n    config:\n      protocol: http\n      hostname: ''\n      port: ''\n      auth:\n        username: ''\n        password: ''\n      bypassProxy: ''\n  environments:\n    - name: Prod\n      variables:\n        - name: baseUrl\n          value: https://api.trytalo.com\n        - name: apiKey\n          secret: true\nitems:\n  - info:\n      name: Healthcheck\n      type: http\n      seq: 2\n    http:\n      method: GET\n      url: '{{baseUrl}}/v1/health-check'\n      auth: inherit\n    settings:\n      encodeUrl: true\n      timeout: 0\n      followRedirects: true\n      maxRedirects: 5\n    docs: Health check endpoint (returns 204).\n  - info:\n      name: Channels\n      type: folder\n      seq: 1\n    request:\n      auth: inherit\n    docs:\n      content: |\n        Channels are a way to send messages between players in your game. You can use channels to create chat rooms, send notifications or create any other kind of messaging system you can think of.\n\n        Learn more about channels [here](https://trytalo.com/channels?utm_source=bruno-docs).\n      type: text/markdown\n    items:\n      - info:\n          name: Channels - create\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/game-channels'\n          body:\n            type: json\n            data: |-\n              {\n                \"name\": \"{{channelName}}\",\n                \"autoCleanup\": false,\n                \"private\": false,\n                \"temporaryMembership\": false\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Create a game channel.\n\n          **Authentication**\n          - Required scope: `write:gameChannels`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Body**\n          - `name` - The name of the channel.\n          - `props` (optional) - Key/value pairs (set `value` to `null` to delete).\n          - `autoCleanup` (optional, default `false`) - Delete the channel when the owner leaves or the channel empties.\n          - `private` (optional, default `false`) - Players can only join the channel if they are invited. The channel will not appear in the channels list.\n          - `temporaryMembership` (optional, default `false`) - Remove members when they go offline.\n      - info:\n          name: Channels - delete\n          type: http\n          seq: 10\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/v1/game-channels/:channelId'\n          params:\n            - name: channelId\n              value: '{{channelId}}'\n              type: path\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Delete a game channel.\n\n          **Authentication**\n          - Required scope: `write:gameChannels`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Path**\n          - `{{channelId}}` - The ID of the channel.\n      - info:\n          name: Channels - find storage\n          type: http\n          seq: 12\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/game-channels/:channelId/storage?propKey={{propKey}}'\n          params:\n            - name: channelId\n              value: '{{channelId}}'\n              type: path\n            - name: propKey\n              value: '{{propKey}}'\n              type: query\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Get a single storage prop from a game channel.\n\n          **Authentication**\n          - Required scope: `read:gameChannels`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Path**\n          - `{{channelId}}` - The ID of the channel.\n\n          **Query**\n          - `propKey` - The key of the storage property to retrieve.\n      - info:\n          name: Channels - get\n          type: http\n          seq: 5\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/game-channels/:channelId'\n          params:\n            - name: channelId\n              value: '{{channelId}}'\n              type: path\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Find a game channel.\n\n          **Authentication**\n          - Required scope: `read:gameChannels`.\n\n          **Path**\n          - `{{channelId}}` - The ID of the channel.\n      - info:\n          name: Channels - invite\n          type: http\n          seq: 8\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/game-channels/:channelId/invite'\n          params:\n            - name: channelId\n              value: '{{channelId}}'\n              type: path\n          body:\n            type: json\n            data: |-\n              {\n                \"inviteeAliasId\": {{inviteeAliasId}}\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Invite another player to a game channel. Used for private channels.\n\n          **Authentication**\n          - Required scope: `write:gameChannels`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Path**\n          - `{{channelId}}` - The ID of the channel.\n\n          **Body**\n          - `inviteeAliasId` - The ID of the player alias to invite.\n      - info:\n          name: Channels - join\n          type: http\n          seq: 2\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/game-channels/:channelId/join'\n          params:\n            - name: channelId\n              value: '{{channelId}}'\n              type: path\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Join a game channel.\n\n          **Authentication**\n          - Required scope: `write:gameChannels`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Path**\n          - `{{channelId}}` - The ID of the channel.\n      - info:\n          name: Channels - leave\n          type: http\n          seq: 3\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/game-channels/:channelId/leave'\n          params:\n            - name: channelId\n              value: '{{channelId}}'\n              type: path\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Leave a game channel.\n\n          **Authentication**\n          - Required scope: `write:gameChannels`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Path**\n          - `{{channelId}}` - The ID of the channel.\n      - info:\n          name: Channels - list storage\n          type: http\n          seq: 13\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/game-channels/:channelId/storage/list?propKeys={{propKey1}}&propKeys={{propKey2}}'\n          params:\n            - name: propKeys\n              value: '{{propKey1}}'\n              type: query\n            - name: propKeys\n              value: '{{propKey2}}'\n              type: query\n            - name: channelId\n              value: '{{channelId}}'\n              type: path\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Get multiple storage props from a game channel.\n\n          **Authentication**\n          - Required scope: `read:gameChannels`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Path**\n          - `{{channelId}}` - The ID of the channel.\n\n          **Query**\n          - `propKeys` - Storage keys to retrieve. Pass the same query parameter once per key (1-50 keys).\n      - info:\n          name: Channels - list\n          type: http\n          seq: 4\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/game-channels'\n          params:\n            - name: page\n              value: '0'\n              type: query\n            - name: search\n              value: ''\n              type: query\n              disabled: true\n            - name: propKey\n              value: ''\n              type: query\n              disabled: true\n            - name: propValue\n              value: ''\n              type: query\n              disabled: true\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          List game channels.\n\n          **Authentication**\n          - Required scope: `read:gameChannels`.\n\n          **Query**\n          - `page` (optional, default `0`) - The current pagination index.\n          - `search` (optional) - Search term to filter channels by name.\n          - `propKey` (optional) - Only return channels with this prop key.\n          - `propValue` (optional) - Only return channels with a matching prop key and value.\n      - info:\n          name: Channels - members\n          type: http\n          seq: 7\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/game-channels/:channelId/members'\n          params:\n            - name: channelId\n              value: '{{channelId}}'\n              type: path\n            - name: page\n              value: '0'\n              type: query\n            - name: playerId\n              value: '{{playerId}}'\n              type: query\n              disabled: true\n            - name: aliasId\n              value: '{{aliasId}}'\n              type: query\n              disabled: true\n            - name: identifier\n              value: ''\n              type: query\n              disabled: true\n            - name: playerPropKey\n              value: ''\n              type: query\n              disabled: true\n            - name: playerPropValue\n              value: ''\n              type: query\n              disabled: true\n            - name: playerGroupId\n              value: '{{groupId}}'\n              type: query\n              disabled: true\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Get the members of a game channel.\n\n          **Authentication**\n          - Required scope: `read:gameChannels`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Path**\n          - `{{channelId}}` - The ID of the channel.\n\n          **Query**\n          - `page` (optional, default `0`) - The current pagination index.\n          - `playerId` (optional) - Filter members by this player ID.\n          - `aliasId` (optional) - Find a member with this player alias ID.\n          - `identifier` (optional) - Find a member with this identifier.\n          - `playerPropKey` (optional) - Filter members by players with this prop key.\n          - `playerPropValue` (optional) - Filter members by players with a matching prop key and value.\n          - `playerGroupId` (optional) - Filter members by players in this group.\n      - info:\n          name: Channels - subscriptions\n          type: http\n          seq: 6\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/game-channels/subscriptions'\n          params:\n            - name: propKey\n              value: ''\n              type: query\n              disabled: true\n            - name: propValue\n              value: ''\n              type: query\n              disabled: true\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          List game channels that the player is subscribed to.\n\n          **Authentication**\n          - Required scope: `read:gameChannels`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Query**\n          - `propKey` (optional) - Only return channels with this prop key.\n          - `propValue` (optional) - Only return channels with a matching prop key and value.\n      - info:\n          name: Channels - update storage\n          type: http\n          seq: 11\n        http:\n          method: PUT\n          url: '{{baseUrl}}/v1/game-channels/:channelId/storage'\n          params:\n            - name: channelId\n              value: '{{channelId}}'\n              type: path\n          body:\n            type: json\n            data: |-\n              {\n                \"props\": [\n                  {\n                    \"key\": \"colour\",\n                    \"value\": {{$randomColor}}\n                  },\n                  {\n                    \"key\": \"catchPhrase\",\n                    \"value\": {{$randomCatchPhrase}}\n                  },\n                  {\n                    \"key\": \"items[]\",\n                    \"value\": \"sword\"\n                  },\n                  {\n                    \"key\": \"items[]\",\n                    \"value\": \"shield\"\n                  }\n                ]\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Create or update storage props in a game channel.\n\n          **Authentication**\n          - Required scope: `write:gameChannels`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Path**\n          - `{{channelId}}` - The ID of the channel.\n\n          **Body**\n          - `props` - Array of key/value pairs. Set `value` to `null` to delete a property.\n      - info:\n          name: Channels - update\n          type: http\n          seq: 9\n        http:\n          method: PUT\n          url: '{{baseUrl}}/v1/game-channels/:channelId'\n          params:\n            - name: channelId\n              value: '{{channelId}}'\n              type: path\n          body:\n            type: json\n            data: |-\n              {\n                \"name\": \"{{channelName}}\",\n                \"props\": [],\n                \"ownerAliasId\": null,\n                \"autoCleanup\": false,\n                \"private\": false,\n                \"temporaryMembership\": false\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Update a game channel.\n\n          **Authentication**\n          - Required scope: `write:gameChannels`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Path**\n          - `{{channelId}}` - The ID of the channel.\n\n          **Body**\n          - `name` (optional) - The new name of the channel.\n          - `props` (optional) - Key/value pairs (set `value` to `null` to delete).\n          - `ownerAliasId` (optional) - The ID of the new owner of the channel.\n          - `autoCleanup` (optional, default `false`) - Delete the channel when the owner leaves or the channel empties.\n          - `private` (optional, default `false`) - Players can only join the channel if they are invited. The channel will not appear in the channels list.\n          - `temporaryMembership` (optional, default `false`) - Remove members when they go offline.\n  - info:\n      name: Events\n      type: folder\n      seq: 3\n    request:\n      auth: inherit\n    docs:\n      content: |\n        Event tracking lets you get rid of the guess-work. By tracking important actions when they happen, you're able to gauge how well a mechanic is being used and even track the overall progress of your players. See how often potions get used, items get bought and how many level-ups there are per day, month or year.\n\n        Learn more about events [here](https://trytalo.com/events?utm_source=bruno-docs).\n      type: text/markdown\n    items:\n      - info:\n          name: Events - create\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/events'\n          body:\n            type: json\n            data: |-\n              {\n                \"events\": [\n                  {\n                    \"name\": \"Pick colour\",\n                    \"timestamp\": {{timestamp_ms}},\n                    \"props\": [\n                      {\n                        \"key\": \"colour\",\n                        \"value\": \"{{$randomColor}}\"\n                      },\n                      {\n                        \"key\": \"META_OS\",\n                        \"value\": \"Windows\"\n                      },\n                      {\n                        \"key\": \"META_GAME_VERSION\",\n                        \"value\": \"1.0.0\"\n                      }\n                    ]\n                  }\n                ]\n              }\n          auth: inherit\n        runtime:\n          scripts:\n            - type: before-request\n              code: bru.setVar(\"timestamp_ms\", Date.now())\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Track events.\n\n          **Authentication**\n          - Required scope: `write:events`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Body**\n          - `events` - Array of events, each `{ name, timestamp, props? }`. `name` is what will appear in the dashboard. `timestamp` is milliseconds since epoch. `props` is an array of key/value pairs.\n  - info:\n      name: Feedback\n      type: folder\n      seq: 4\n    request:\n      auth: inherit\n    docs:\n      content: |\n        Using Talo's Feedback service, you can effortlessly collect valuable player feedback to improve your game's experience. Players can send feedback directly from within the game, providing insights that can help you understand their needs and preferences better.\n\n        Learn more about feedback [here](https://trytalo.com/feedback?utm_source=bruno-docs).\n      type: text/markdown\n    items:\n      - info:\n          name: Feedback - create\n          type: http\n          seq: 2\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/game-feedback/categories/:feedbackCategoryInternalName'\n          params:\n            - name: feedbackCategoryInternalName\n              value: '{{feedbackCategoryInternalName}}'\n              type: path\n          body:\n            type: json\n            data: |-\n              {\n                \"comment\": \"There is a bug\",\n                \"props\": [\n                  {\n                    \"key\": \"currentLevel\",\n                    \"value\": \"5\"\n                  }\n                ]\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Create a player feedback entry. Set the `X-Talo-Continuity-Timestamp` header (milliseconds since epoch) to back-date `createdAt` (the API key must have the `write:continuityRequests` scope, and the timestamp must be in the past) - use this to record feedback for a session that occurred before the request.\n\n          **Authentication**\n          - Required scope: `write:gameFeedback`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Path**\n          - `{{feedbackCategoryInternalName}}` - The internal name of the feedback category.\n\n          **Body**\n          - `comment` - The comment made by the player (1-5000 characters).\n          - `props` (optional) - Key/value pairs.\n      - info:\n          name: Feedback - get categories\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/game-feedback/categories'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Get available feedback categories.\n\n          **Authentication**\n          - Required scope: `read:gameFeedback`.\n  - info:\n      name: Leaderboards\n      type: folder\n      seq: 6\n    request:\n      auth: inherit\n    docs:\n      content: |\n        Talo aims to work across many different game genres and as such our leaderboards are highly-customisable. Leaderboards can be sorted by descending or ascending order. You can also customise whether players can only have one or multiple entries in a single leaderboard.\n\n        Learn more about leaderboards [here](https://trytalo.com/leaderboards?utm_source=bruno-docs).\n      type: text/markdown\n    items:\n      - info:\n          name: Leaderboard - list entries\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/leaderboards/:leaderboardInternalName/entries'\n          params:\n            - name: leaderboardInternalName\n              value: '{{leaderboardInternalName}}'\n              type: path\n            - name: page\n              value: '0'\n              type: query\n            - name: aliasId\n              value: '{{aliasId}}'\n              type: query\n              disabled: true\n            - name: withDeleted\n              value: '0'\n              type: query\n              disabled: true\n            - name: propKey\n              value: ''\n              type: query\n              disabled: true\n            - name: propValue\n              value: ''\n              type: query\n              disabled: true\n            - name: startDate\n              value: ''\n              type: query\n              disabled: true\n            - name: endDate\n              value: ''\n              type: query\n              disabled: true\n            - name: aliasService\n              value: ''\n              type: query\n              disabled: true\n            - name: playerId\n              value: '{{playerId}}'\n              type: query\n              disabled: true\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Get a leaderboard's entries. 50 entries returned per page, in the leaderboard's sort order.\n\n          **Authentication**\n          - Required scope: `read:leaderboards`.\n\n          **Path**\n          - `{{leaderboardInternalName}}` - The internal name of the leaderboard.\n\n          **Query**\n          - `page` (optional, default `0`) - The current pagination index.\n          - `aliasId` (optional) - Only return entries for this alias ID.\n          - `withDeleted` (optional) - Include entries that were deleted by a refresh interval (`0` or `1`).\n          - `propKey` (optional) - Only return entries with this prop key.\n          - `propValue` (optional) - Only return entries with a matching prop key and value.\n          - `startDate` (optional) - UTC date (YYYY-MM-DD), ISO 8601 datetime, or millisecond timestamp.\n          - `endDate` (optional) - Same format as `startDate`.\n          - `aliasService` (optional) - Only return entries for this alias service (e.g. `steam`, `google_play_games`, `username`).\n          - `playerId` (optional) - Only return entries for this player ID.\n      - info:\n          name: Leaderboard - create entry\n          type: http\n          seq: 2\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/leaderboards/:leaderboardInternalName/entries'\n          params:\n            - name: leaderboardInternalName\n              value: '{{leaderboardInternalName}}'\n              type: path\n          body:\n            type: json\n            data: |-\n              {\n                \"score\": 100,\n                \"props\": [\n                  {\n                    \"key\": \"level\",\n                    \"value\": \"5\"\n                  }\n                ]\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Create or update a leaderboard entry. If the leaderboard mode is `unique`, an existing entry for the player will be updated with the new score (and the response's `updated` field will be `true`). Set the `X-Talo-Continuity-Timestamp` header (milliseconds since epoch) to back-date `createdAt` (the API key must have the `write:continuityRequests` scope, and the timestamp must be in the past) - use this to revive a unique-period entry whose period has already closed.\n\n          **Authentication**\n          - Required scope: `write:leaderboards`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Path**\n          - `{{leaderboardInternalName}}` - The internal name of the leaderboard.\n\n          **Body**\n          - `score` - A numeric score for the entry.\n          - `props` (optional) - Key/value pairs.\n  - info:\n      name: Player auth\n      type: folder\n      seq: 8\n    request:\n      auth: inherit\n    docs:\n      content: |\n        Talo provides a powerful and secure authentication system out of the box. You can use Talo to authenticate players using their email, username, or any other identifier you choose.\n\n        Learn more about player authentication [here](https://trytalo.com/players#authentication?utm_source=bruno-docs).\n      type: text/markdown\n    items:\n      - info:\n          name: Player auth - change email\n          type: http\n          seq: 9\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/players/auth/change_email'\n          body:\n            type: json\n            data: |-\n              {\n                \"currentPassword\": \"{{currentPassword}}\",\n                \"newEmail\": \"{{newEmail}}\"\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Change the email address of a player account.\n\n          **Authentication**\n          - Required scopes: `read:players`, `write:players`.\n          - Authenticated by: `X-Talo-Player` + `X-Talo-Alias` + `X-Talo-Session`.\n\n          **Body**\n          - `currentPassword` - The current password of the player.\n          - `newEmail` - The new email address for the player.\n      - info:\n          name: Player auth - change identifier\n          type: http\n          seq: 8\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/players/auth/change_identifier'\n          body:\n            type: json\n            data: |-\n              {\n                \"currentPassword\": \"{{currentPassword}}\",\n                \"newIdentifier\": \"{{newIdentifier}}\"\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Change the identifier of a player account.\n\n          **Authentication**\n          - Required scopes: `read:players`, `write:players`.\n          - Authenticated by: `X-Talo-Player` + `X-Talo-Alias` + `X-Talo-Session`.\n\n          **Body**\n          - `currentPassword` - The current password of the player.\n          - `newIdentifier` - The new identifier for the player.\n      - info:\n          name: Player auth - change password\n          type: http\n          seq: 10\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/players/auth/change_password'\n          body:\n            type: json\n            data: |-\n              {\n                \"currentPassword\": \"{{currentPassword}}\",\n                \"newPassword\": \"{{newPassword}}\"\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Change the password of a player account.\n\n          **Authentication**\n          - Required scopes: `read:players`, `write:players`.\n          - Authenticated by: `X-Talo-Player` + `X-Talo-Alias` + `X-Talo-Session`.\n\n          **Body**\n          - `currentPassword` - The current password of the player.\n          - `newPassword` - The new password for the player.\n      - info:\n          name: Player auth - delete\n          type: http\n          seq: 6\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/v1/players/auth'\n          body:\n            type: json\n            data: |-\n              {\n                \"currentPassword\": \"{{currentPassword}}\"\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Delete a player account.\n\n          **Authentication**\n          - Required scopes: `read:players`, `write:players`.\n          - Authenticated by: `X-Talo-Player` + `X-Talo-Alias` + `X-Talo-Session`.\n\n          **Body**\n          - `currentPassword` - The current password of the player.\n      - info:\n          name: Player auth - forgot password\n          type: http\n          seq: 11\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/players/auth/forgot_password'\n          body:\n            type: json\n            data: |-\n              {\n                \"email\": \"{{email}}\"\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Send a password reset email to an email address.\n\n          **Authentication**\n          - Required scopes: `read:players`, `write:players`.\n\n          **Body**\n          - `email` - The email address. If no player with this email exists, the request is silently ignored.\n      - info:\n          name: Player auth - login\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/players/auth/login'\n          body:\n            type: json\n            data: |-\n              {\n                \"identifier\": \"{{identifier}}\",\n                \"password\": \"{{password}}\",\n                \"withRefresh\": true\n              }\n          auth: inherit\n        runtime:\n          scripts:\n            - type: after-response\n              code: |-\n                const data = res.getBody();\n\n                if (data.alias) {\n                  bru.setEnvVar('aliasId', data.alias.id)\n                  bru.setEnvVar('playerId', data.alias.player.id)\n                  bru.setEnvVar('socketToken', data.socketToken)\n                  if (data.refreshToken) {\n                    bru.setEnvVar('refreshToken', data.refreshToken)\n                    bru.setVar('sessionToken', data.sessionToken)\n                  } else {\n                    bru.setEnvVar('sessionToken', data.sessionToken)\n                  }\n                }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Login to a player account.\n\n          **Authentication**\n          - Required scopes: `read:players`, `write:players`.\n\n          **Body**\n          - `identifier` - The unique identifier of the player.\n          - `password` - The player's password.\n          - `withRefresh` (optional, recommended) - When `true`, the response includes a `refreshToken` (30-day lifetime) alongside a `sessionToken` that becomes short-lived (15 minutes). When `false` or omitted, the `sessionToken` is long-lived (no expiry) and no `refreshToken` is returned.\n      - info:\n          name: Player auth - logout\n          type: http\n          seq: 4\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/players/auth/logout'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Logout of a player account (and invalidate the session token).\n\n          **Authentication**\n          - Required scopes: `read:players`, `write:players`.\n          - Authenticated by: `X-Talo-Player` + `X-Talo-Alias` + `X-Talo-Session`.\n      - info:\n          name: Player auth - migrate\n          type: http\n          seq: 7\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/players/auth/migrate'\n          body:\n            type: json\n            data: |-\n              {\n                \"currentPassword\": \"{{currentPassword}}\",\n                \"service\": \"{{migrateToService}}\",\n                \"identifier\": \"{{newIdentifier}}\"\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Migrate a Talo player account to another service. The player's auth details are removed; they must log in using the new service and identifier.\n\n          **Authentication**\n          - Required scopes: `read:players`, `write:players`.\n          - Authenticated by: `X-Talo-Player` + `X-Talo-Alias` + `X-Talo-Session`.\n\n          **Body**\n          - `currentPassword` - The current password of the player.\n          - `service` - The service to migrate to (e.g. `steam`, `google_play_games`). Cannot be `talo`.\n          - `identifier` - The new identifier for the player.\n      - info:\n          name: Player auth - refresh\n          type: http\n          seq: 5\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/players/auth/refresh'\n          body:\n            type: json\n            data: |-\n              {\n                \"refreshToken\": \"{{refreshToken}}\"\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Refresh a player session token using a refresh token.\n\n          **Authentication**\n          - Required scopes: `read:players`, `write:players`.\n\n          **Body**\n          - `refreshToken` - The refresh token issued after a successful login or registration.\n      - info:\n          name: Player auth - register\n          type: http\n          seq: 3\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/players/auth/register'\n          body:\n            type: json\n            data: |-\n              {\n                \"identifier\": \"{{identifier}}\",\n                \"password\": \"{{password}}\",\n                \"verificationEnabled\": false,\n                \"withRefresh\": true\n              }\n          auth: inherit\n        runtime:\n          scripts:\n            - type: after-response\n              code: |-\n                const data = res.getBody();\n                bru.setEnvVar('aliasId', data.alias.id)\n                bru.setEnvVar('playerId', data.alias.player.id)\n                bru.setEnvVar('socketToken', data.socketToken)\n                if (data.refreshToken) {\n                  bru.setEnvVar('refreshToken', data.refreshToken)\n                  bru.setVar('sessionToken', data.sessionToken)\n                } else {\n                  bru.setEnvVar('sessionToken', data.sessionToken)\n                }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Create a new player account.\n\n          **Authentication**\n          - Required scopes: `read:players`, `write:players`.\n\n          **Body**\n          - `identifier` - The unique identifier of the player (username, email, or numeric ID).\n          - `password` - The password the player will log in with.\n          - `verificationEnabled` (optional) - When `true`, the player must enter a verification code before logging in.\n          - `email` (optional) - Required when `verificationEnabled` is `true`; also used for password resets.\n          - `withRefresh` (optional, recommended) - When `true`, the response includes a `refreshToken` (30-day lifetime) alongside a `sessionToken` that becomes short-lived (15 minutes). When `false` or omitted, the `sessionToken` is long-lived (no expiry) and no `refreshToken` is returned.\n      - info:\n          name: Player auth - reset password\n          type: http\n          seq: 12\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/players/auth/reset_password'\n          body:\n            type: json\n            data: |-\n              {\n                \"code\": \"{{resetCode}}\",\n                \"password\": \"{{newPassword}}\"\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Reset the password of a player account (invalidates any existing session tokens).\n\n          **Authentication**\n          - Required scopes: `read:players`, `write:players`.\n\n          **Body**\n          - `code` - The 6-digit code sent to the email (as a string).\n          - `password` - The new password for the player.\n      - info:\n          name: Player auth - toggle verification\n          type: http\n          seq: 13\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/v1/players/auth/toggle_verification'\n          body:\n            type: json\n            data: |-\n              {\n                \"currentPassword\": \"{{currentPassword}}\",\n                \"verificationEnabled\": true,\n                \"email\": \"{{email}}\"\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Toggle verification for a player account.\n\n          **Authentication**\n          - Required scopes: `read:players`, `write:players`.\n          - Authenticated by: `X-Talo-Player` + `X-Talo-Alias` + `X-Talo-Session`.\n\n          **Body**\n          - `currentPassword` - The current password of the player.\n          - `verificationEnabled` - The new verification status for the player account.\n          - `email` (optional) - Required when enabling verification if the player has no email set.\n      - info:\n          name: Player auth - verify\n          type: http\n          seq: 2\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/players/auth/verify'\n          body:\n            type: json\n            data: |-\n              {\n                \"aliasId\": {{aliasId}},\n                \"code\": \"{{verifyCode}}\",\n                \"withRefresh\": true\n              }\n          auth: inherit\n        runtime:\n          scripts:\n            - type: after-response\n              code: |-\n                const data = res.getBody();\n                bru.setEnvVar('aliasId', data.alias.id)\n                bru.setEnvVar('playerId', data.alias.player.id)\n                bru.setEnvVar('socketToken', data.socketToken)\n                bru.setEnvVar('sessionToken', data.sessionToken)\n                if (data.refreshToken) {\n                  bru.setEnvVar('refreshToken', data.refreshToken)\n                  bru.setVar('sessionToken', data.sessionToken)\n                } else {\n                  bru.setEnvVar('sessionToken', data.sessionToken)\n                }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Provide the verification code to start the player session.\n\n          **Authentication**\n          - Required scopes: `read:players`, `write:players`.\n\n          **Body**\n          - `aliasId` - The ID of the alias to verify.\n          - `code` - The 6-digit verification code sent to the player (as a string).\n          - `withRefresh` (optional, recommended) - When `true`, the response includes a `refreshToken` (30-day lifetime) alongside a `sessionToken` that becomes short-lived (15 minutes). When `false` or omitted, the `sessionToken` is long-lived (no expiry) and no `refreshToken` is returned.\n  - info:\n      name: Player relationships\n      type: folder\n      seq: 11\n    request:\n      auth: inherit\n    docs:\n      content: |\n        Talo's player relationships API is the easiest way to build friends lists, follower systems, party invites and other social features that need player-to-player connections.\n      type: text/markdown\n    items:\n      - info:\n          name: Player relationships - confirm\n          type: http\n          seq: 2\n        http:\n          method: PUT\n          url: '{{baseUrl}}/v1/players/relationships/:subscriptionId/confirm'\n          params:\n            - name: subscriptionId\n              value: '{{subscriptionId}}'\n              type: path\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Confirm a pending subscription request.\n\n          **Authentication**\n          - Required scope: `write:playerRelationships`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Path**\n          - `{{subscriptionId}}` - The ID of the subscription request to confirm.\n      - info:\n          name: Player relationships - create\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/players/relationships'\n          body:\n            type: json\n            data: |-\n              {\n                \"aliasId\": {{targetAliasId}},\n                \"relationshipType\": \"unidirectional\"\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Create a subscription request to another player.\n\n          **Authentication**\n          - Required scope: `write:playerRelationships`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Body**\n          - `aliasId` - The ID of the player alias to subscribe to.\n          - `relationshipType` - `\"unidirectional\"` or `\"bidirectional\"`.\n      - info:\n          name: Player relationships - delete\n          type: http\n          seq: 5\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/v1/players/relationships/:subscriptionId'\n          params:\n            - name: subscriptionId\n              value: '{{subscriptionId}}'\n              type: path\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Delete a subscription (unsubscribe from a player).\n\n          **Authentication**\n          - Required scope: `write:playerRelationships`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Path**\n          - `{{subscriptionId}}` - The ID of the subscription to delete.\n      - info:\n          name: Player relationships - subscribers\n          type: http\n          seq: 3\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/players/relationships/subscribers'\n          params:\n            - name: page\n              value: '0'\n              type: query\n            - name: confirmed\n              value: 'true'\n              type: query\n              disabled: true\n            - name: aliasId\n              value: '{{targetAliasId}}'\n              type: query\n              disabled: true\n            - name: relationshipType\n              value: unidirectional\n              type: query\n              disabled: true\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          List subscriptions from players who have subscribed to the current player.\n\n          **Authentication**\n          - Required scope: `read:playerRelationships`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Query**\n          - `page` (optional, default `0`) - Pagination index.\n          - `confirmed` (optional) - Filter by confirmation status (`true` or `false`).\n          - `aliasId` (optional) - Filter by a specific subscriber alias ID.\n          - `relationshipType` (optional) - Filter by relationship type (`unidirectional` or `bidirectional`).\n      - info:\n          name: Player relationships - subscriptions\n          type: http\n          seq: 4\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/players/relationships/subscriptions'\n          params:\n            - name: page\n              value: '0'\n              type: query\n            - name: confirmed\n              value: 'true'\n              type: query\n              disabled: true\n            - name: aliasId\n              value: '{{targetAliasId}}'\n              type: query\n              disabled: true\n            - name: relationshipType\n              value: unidirectional\n              type: query\n              disabled: true\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          List subscriptions where the current player is the subscriber.\n\n          **Authentication**\n          - Required scope: `read:playerRelationships`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Query**\n          - `page` (optional, default `0`) - Pagination index.\n          - `confirmed` (optional) - Filter by confirmation status (`true` or `false`).\n          - `aliasId` (optional) - Filter by a specific subscribed-to alias ID.\n          - `relationshipType` (optional) - Filter by relationship type (`unidirectional` or `bidirectional`).\n  - info:\n      name: Saves\n      type: folder\n      seq: 12\n    request:\n      auth: inherit\n    docs:\n      content: |\n        Talo's save system allows you to persist your game's state across multiple sessions. Each object in your scene can be saved and restored automatically from one of your player's saves.\n\n        Learn more about game saves [here](https://trytalo.com/saves?utm_source=bruno-docs).\n      type: text/markdown\n    items:\n      - info:\n          name: Saves - delete\n          type: http\n          seq: 4\n        http:\n          method: DELETE\n          url: '{{baseUrl}}/v1/game-saves/:saveId'\n          params:\n            - name: saveId\n              value: '{{saveId}}'\n              type: path\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Delete a save.\n\n          **Authentication**\n          - Required scope: `write:gameSaves`.\n          - Authenticated by: `X-Talo-Player`.\n\n          **Path**\n          - `{{saveId}}` - The ID of the save.\n      - info:\n          name: Saves - list\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/game-saves'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Get a player's saves.\n\n          **Authentication**\n          - Required scope: `read:gameSaves`.\n          - Authenticated by: `X-Talo-Player`.\n      - info:\n          name: Saves - update\n          type: http\n          seq: 3\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/v1/game-saves/:saveId'\n          params:\n            - name: saveId\n              value: '{{saveId}}'\n              type: path\n          body:\n            type: json\n            data: |-\n              {\n                \"name\": \"{{saveName}}\",\n                \"content\": {\n                  \"example\": true\n                }\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Update a save.\n\n          **Authentication**\n          - Required scope: `write:gameSaves`.\n          - Authenticated by: `X-Talo-Player`.\n\n          **Path**\n          - `{{saveId}}` - The ID of the save.\n\n          **Body**\n          - `name` (optional) - A new name for the save.\n          - `content` - The new save content (JSON object or string).\n      - info:\n          name: Saves - create\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/game-saves'\n          body:\n            type: json\n            data: |-\n              {\n                \"name\": \"{{saveName}}\",\n                \"content\": {\n                  \"example\": true\n                }\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Create a save.\n\n          **Authentication**\n          - Required scope: `write:gameSaves`.\n          - Authenticated by: `X-Talo-Player`.\n\n          **Body**\n          - `name` - The name of the save.\n          - `content` - The save's content (JSON object or string).\n  - info:\n      name: Player presence\n      type: folder\n      seq: 10\n    request:\n      auth: inherit\n    docs:\n      content: |\n        The player presence API allows you to automatically track the presence of players in your game. This can be useful for a variety of use cases, such as showing a player as online or offline, setting custom statuses and friends lists.\n      type: text/markdown\n    items:\n      - info:\n          name: Player presence - update\n          type: http\n          seq: 2\n        http:\n          method: PUT\n          url: '{{baseUrl}}/v1/players/presence'\n          body:\n            type: json\n            data: |-\n              {\n                \"online\": true,\n                \"customStatus\": \"Appearing offline\"\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Update a player's online status and custom status.\n\n          **Authentication**\n          - Required scope: `write:playerPresence`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Body**\n          - `online` (optional) - Whether the player is online.\n          - `customStatus` (optional) - A custom status message for the player.\n      - info:\n          name: Player presence - find\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/players/presence/:playerId'\n          params:\n            - name: playerId\n              value: '{{playerId}}'\n              type: path\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Get a player's online status and custom status.\n\n          **Authentication**\n          - Required scope: `read:playerPresence`.\n\n          **Path**\n          - `{{playerId}}` - The ID of the player.\n  - info:\n      name: Players\n      type: folder\n      seq: 7\n    request:\n      auth: inherit\n    docs:\n      content: |\n        Talo provides a powerful and secure authentication system out of the box. You can use Talo to authenticate players using their email, username, or any other identifier you choose. Players can have any number of arbitrary properties that will persist between game sessions and all of their identities. You can use these, for example, to store a player's current health or level.\n\n        Learn more about player management [here](https://trytalo.com/players?utm_source=bruno-docs).\n      type: text/markdown\n    items:\n      - info:\n          name: Players - create socket token\n          type: http\n          seq: 6\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/players/socket-token'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Create a socket token for a player.\n\n          **Authentication**\n          - Required scope: `write:players`.\n          - Authenticated by: `X-Talo-Alias`.\n      - info:\n          name: Players - identify\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/players/identify?service={{service}}&identifier={{identifier}}'\n          params:\n            - name: service\n              value: '{{service}}'\n              type: query\n            - name: identifier\n              value: '{{identifier}}'\n              type: query\n          auth: inherit\n        runtime:\n          scripts:\n            - type: after-response\n              code: |-\n                const data = res.getBody();\n                bru.setVar('aliasId', data.alias.id)\n                bru.setVar('playerId', data.alias.player.id)\n                bru.setVar('socketToken', data.socketToken)\n                if (data.sessionToken) {\n                  bru.setVar('sessionToken', data.sessionToken)\n                }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Identify a player. A new player can be created if one does not exist for the given service+identifier pair.\n\n          **Authentication**\n          - Required scope: `read:players`. Add `write:players` if you want the request to create new players.\n          - Authenticated by: `X-Talo-Session` is required when the resolved alias's service is `talo`.\n\n          **Query**\n          - `{{service}}` - An arbitrary name for how the identifier is chosen (e.g. `anonymous`, `username`, `email`).\n          - `{{identifier}}` - The unique identifier (username, email, or numeric ID).\n      - info:\n          name: Players - find\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/players/:playerId'\n          params:\n            - name: playerId\n              value: '{{playerId}}'\n              type: path\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Find a player.\n\n          **Authentication**\n          - Required scope: `read:players`.\n\n          **Path**\n          - `{{playerId}}` - The ID of the player.\n      - info:\n          name: Players - merge\n          type: http\n          seq: 5\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/players/merge'\n          body:\n            type: json\n            data: |-\n              {\n                \"playerId1\": \"{{playerId1}}\",\n                \"playerId2\": \"{{playerId2}}\"\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Merge two players. Player 2 is merged into player 1.\n\n          **Authentication**\n          - Required scopes: `read:players`, `write:players`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Body**\n          - `playerId1` - The target player (player 2 is merged into this).\n          - `playerId2` - The source player. Cannot have a Steam, Google Play Games, or Talo authentication alias.\n      - info:\n          name: Players - update\n          type: http\n          seq: 4\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/v1/players/:playerId'\n          params:\n            - name: playerId\n              value: '{{playerId}}'\n              type: path\n          body:\n            type: json\n            data: |-\n              {\n                \"props\": [\n                  {\n                    \"key\": \"currentHealth\",\n                    \"value\": \"100\"\n                  }\n                ]\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Update a player's props.\n\n          **Authentication**\n          - Required scope: `write:players`.\n\n          **Path**\n          - `{{playerId}}` - The ID of the player.\n\n          **Body**\n          - `props` (optional) - Key/value pairs. Set `value` to `null` to delete a prop.\n      - info:\n          name: Players - search\n          type: http\n          seq: 3\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/players/search?query={{query}}'\n          params:\n            - name: query\n              value: '{{query}}'\n              type: query\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Search for players.\n\n          **Authentication**\n          - Required scope: `read:players`.\n\n          **Query**\n          - `query` - Search by IDs, prop values, alias identifiers, and display names.\n  - info:\n      name: Stats\n      type: folder\n      seq: 14\n    request:\n      auth: inherit\n    docs:\n      content: |\n        With Talo, you can track game stats on a per-player basis. For example, you could track the number of secrets discovered by a player or the amount of puzzles they've solved. Talo allows you to easily create and increment these kind of stats.\n\n        Learn more about game stats [here](https://trytalo.com/stats?utm_source=bruno-docs).\n      type: text/markdown\n    items:\n      - info:\n          name: Stats - all for player\n          type: http\n          seq: 3\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/game-stats/player-stats'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Get the current values of all the player's stats.\n\n          **Authentication**\n          - Required scope: `read:gameStats`.\n          - Authenticated by: `X-Talo-Alias`.\n      - info:\n          name: Stats - global history\n          type: http\n          seq: 6\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/game-stats/:statInternalName/global-history'\n          params:\n            - name: page\n              value: '0'\n              type: query\n            - name: playerId\n              value: '{{playerId}}'\n              type: query\n              disabled: true\n            - name: startDate\n              value: ''\n              type: query\n              disabled: true\n            - name: endDate\n              value: ''\n              type: query\n              disabled: true\n            - name: statInternalName\n              value: '{{statInternalName}}'\n              type: path\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Get a history of changes to a global stat.\n\n          **Authentication**\n          - Required scope: `read:gameStats`.\n\n          **Path**\n          - `{{statInternalName}}` - The internal name of the stat.\n\n          **Query**\n          - `page` (optional, default `0`) - The current pagination index.\n          - `playerId` (optional) - Filter snapshots by this player ID.\n          - `startDate` (optional) - UTC date (YYYY-MM-DD), ISO 8601 datetime, or millisecond timestamp.\n          - `endDate` (optional) - Same format as `startDate`.\n      - info:\n          name: Stats - find\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/game-stats/:statInternalName'\n          params:\n            - name: statInternalName\n              value: '{{statInternalName}}'\n              type: path\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Get an individual game stat.\n\n          **Authentication**\n          - Required scope: `read:gameStats`.\n\n          **Path**\n          - `{{statInternalName}}` - The internal name of the stat.\n      - info:\n          name: Stats - history\n          type: http\n          seq: 5\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/game-stats/:statInternalName/history'\n          params:\n            - name: page\n              value: '0'\n              type: query\n            - name: startDate\n              value: ''\n              type: query\n              disabled: true\n            - name: endDate\n              value: ''\n              type: query\n              disabled: true\n            - name: statInternalName\n              value: '{{statInternalName}}'\n              type: path\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Get a history of changes to a player stat.\n\n          **Authentication**\n          - Required scope: `read:gameStats`.\n          - Authenticated by: `X-Talo-Player`.\n\n          **Path**\n          - `{{statInternalName}}` - The internal name of the stat.\n\n          **Query**\n          - `page` (optional, default `0`) - The current pagination index.\n          - `startDate` (optional) - UTC date (YYYY-MM-DD), ISO 8601 datetime, or millisecond timestamp.\n          - `endDate` (optional) - Same format as `startDate`.\n      - info:\n          name: Stats - one for player\n          type: http\n          seq: 4\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/game-stats/:statInternalName/player-stat'\n          params:\n            - name: statInternalName\n              value: '{{statInternalName}}'\n              type: path\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Get the current value of a player's stat.\n\n          **Authentication**\n          - Required scope: `read:gameStats`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Path**\n          - `{{statInternalName}}` - The internal name of the stat.\n      - info:\n          name: Stats - list\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/game-stats'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Get all game stats.\n\n          **Authentication**\n          - Required scope: `read:gameStats`.\n      - info:\n          name: Stats - track\n          type: http\n          seq: 7\n        http:\n          method: PUT\n          url: '{{baseUrl}}/v1/game-stats/:statInternalName'\n          params:\n            - name: statInternalName\n              value: '{{statInternalName}}'\n              type: path\n          body:\n            type: json\n            data: |-\n              {\n                \"change\": 5\n              }\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Update a stat value. Set the `X-Talo-Continuity-Timestamp` header (milliseconds since epoch) to back-date the resulting snapshot (the API key must have the `write:continuityRequests` scope, and the timestamp must be in the past) - use this to record a stat change that occurred before the request.\n\n          **Authentication**\n          - Required scope: `write:gameStats`.\n          - Authenticated by: `X-Talo-Alias`.\n\n          **Path**\n          - `{{statInternalName}}` - The internal name of the stat.\n\n          **Body**\n          - `change` - The amount to add to the current value (can be negative).\n  - info:\n      name: Player groups\n      type: folder\n      seq: 9\n    request:\n      auth: inherit\n    docs:\n      content: |\n        Using groups, you can divide your player-base into clear segments. For example, you could have a group of beta testers or a group for all the players who have completed the game.\n\n        Learn more about player groups [here](https://trytalo.com/players#groups?utm_source=bruno-docs).\n      type: text/markdown\n    items:\n      - info:\n          name: Groups - find\n          type: http\n          seq: 4\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/player-groups/:groupId'\n          params:\n            - name: membersPage\n              value: '0'\n              type: query\n            - name: groupId\n              value: '{{groupId}}'\n              type: path\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Get a group and its members.\n\n          **Authentication**\n          - Required scope: `read:playerGroups`.\n\n          **Path**\n          - `{{groupId}}` - The ID of the group.\n\n          **Query**\n          - `membersPage` (optional, default `0`) - Pagination index for group members.\n  - info:\n      name: Game config\n      type: folder\n      seq: 5\n    request:\n      auth: inherit\n    docs:\n      content: |\n        Talo's live config allows you to configure your game directly in the dashboard. Your game can then fetch this config on-demand, allowing your game and players to have the latest information without downloading a new update.\n\n        Learn more about live config [here](https://trytalo.com/live-config?utm_source=bruno-docs).\n      type: text/markdown\n    items:\n      - info:\n          name: Game config\n          type: http\n          seq: 3\n        http:\n          method: GET\n          url: '{{baseUrl}}/v1/game-config'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Get the live config for the game.\n\n          **Authentication**\n          - Required scope: `read:gameConfig`.\n  - info:\n      name: Socket tickets\n      type: folder\n      seq: 13\n    request:\n      auth: inherit\n    docs:\n      content: |\n        Talo provides a secure socket system for real-time communication between your game and players. The Talo Socket is the underlying server that powers services like [channels](https://trytalo.com/channels) and handles connections, messages and events.\n\n        To connect to the socket server, you need to obtain a socket ticket.\n      type: text/markdown\n    items:\n      - info:\n          name: Socket tickets\n          type: http\n          seq: 4\n        http:\n          method: POST\n          url: '{{baseUrl}}/v1/socket-tickets'\n          auth: inherit\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: Create a socket ticket. The ticket is valid for 5 minutes and can only be used once.\nrequest:\n  headers:\n    - name: X-Talo-Include-Dev-Data\n      value: '1'\n    - name: X-Talo-Alias\n      value: '{{aliasId}}'\n    - name: X-Talo-Player\n      value: '{{playerId}}'\n    - name: X-Talo-Session\n      value: '{{sessionToken}}'\n  auth:\n    type: bearer\n    token: '{{apiKey}}'\ndocs:\n  content: |-\n    [Talo](https://trytalo.com?utm_source=bruno-docs) is the easiest way to add leaderboards, player authentication, peer-to-peer multiplayer and more to your game.\n\n    Visit the [Talo docs](https://docs.trytalo.com/docs/http/authentication) for more details:\n    - Request and response examples\n    - Common errors\n    - Authentication guides\n\n    This collection was last updated **28th June 2026**.\n  type: text/markdown\nbundled: true\nextensions:\n  bruno:\n    ignore:\n      - node_modules\n      - .git\n    exportedAt: '2026-06-28T23:01:52.367Z'\n    exportedUsing: Bruno/3.5.0\n";
        new window.OpenCollection({
            target: document.getElementById('opencollection-container'),
            opencollection: collectionData,
